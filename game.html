<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打飞机小游戏 - 生存挑战版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 游戏主容器 */
        #wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 800px;
            background: #000;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        /* 状态栏 */
        #status-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            background: #1e1e1e;
            z-index: 5;
        }

        /* 画布区域自适应 */
        #canvas-container {
            position: relative;
            flex-grow: 1;
            width: 100%;
            background: #050505;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 遮罩层（开始/结束界面） */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }
        .overlay h2 { margin-bottom: 15px; font-size: 28px; color: #ff4757; }
        .overlay p { margin-bottom: 25px; font-size: 16px; color: #ccc; line-height: 1.5; }
        .overlay button {
            padding: 12px 35px;
            font-size: 18px;
            background: #2ed573;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.4);
        }

        /* ====== 📱 手机端专用悬浮操作盘 ====== */
        #mobile-controller {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none; 
            z-index: 8;
        }

        /* 左手十字键 */
        .dpad {
            position: relative;
            width: 140px;
            height: 140px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            pointer-events: auto;
        }
        .ctrl-btn {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .ctrl-btn:active {
            background: rgba(255, 255, 255, 0.4);
            color: #fff;
        }
        #btn-up { grid-column: 2; border-bottom: none; border-radius: 12px 12px 0 0; }
        #btn-left { grid-column: 1; grid-row: 2; border-right: none; border-radius: 12px 0 0 12px; }
        .dpad-center { grid-column: 2; grid-row: 2; background: rgba(255, 255, 255, 0.1); border: none; }
        #btn-right { grid-column: 3; grid-row: 2; border-left: none; border-radius: 0 12px 12px 0; }
        #btn-down { grid-column: 2; grid-row: 3; border-top: none; border-radius: 0 0 12px 12px; }

        /* 右手开火键 */
        .fire-sector {
            pointer-events: auto;
        }
        #btn-fire {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: rgba(255, 71, 87, 0.6);
            color: white;
            font-size: 32px;
            border: 2px solid rgba(255, 71, 87, 0.8);
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        #btn-fire:active {
            background: rgba(255, 71, 87, 0.9);
            transform: scale(0.95);
        }

        @media (min-width: 1024px) {
            .ctrl-btn, .dpad, #btn-fire {
                opacity: 0.3; 
            }
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <!-- 顶部数据状态 -->
        <div id="status-bar">
            <div>得分: <span id="score-val">0</span></div>
            <div>倒计时: <span id="time-val">30</span>s</div>
        </div>

        <!-- 游戏核心舞台 -->
        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
            
            <!-- 浮层界面 -->
            <div id="overlay" class="overlay">
                <h2 id="overlay-title">打飞机大作战</h2>
                <p id="overlay-desc">使用键盘 WASD / 方向键，或屏幕虚拟摇杆控制<br>空格键或右下角红按钮开火！<br><b style="color:#ff4757;">注意：千万不要碰到落下的炮弹！</b></p>
                <button id="start-btn" onclick="startGame()">开始游戏</button>
            </div>
        </div>

        <!-- 📱 手机端控制区 -->
        <div id="mobile-controller">
            <div class="dpad">
                <button class="ctrl-btn" id="btn-up">▲</button>
                <button class="ctrl-btn" id="btn-left">◀</button>
                <div class="dpad-center"></div>
                <button class="ctrl-btn" id="btn-right">▶</button>
                <button class="ctrl-btn" id="btn-down">▼</button>
            </div>

            <div class="fire-sector">
                <button class="ctrl-btn" id="btn-fire">🔥</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');

    function resizeCanvas() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- 🎯 替换为你自己的图片资源链接 ---
    const ENEMY_ALIVE_SRC = 'https://i.ibb.co/PG22J8FX/Screenshot-20260517-004026-edit-580395464196329.png'; 
    const ENEMY_HIT_SRC = 'https://i.ibb.co/W421Gjxk/retouch-2026051700424675.png';   

    const imgAlive = new Image(); imgAlive.src = ENEMY_ALIVE_SRC;
    const imgHit = new Image(); imgHit.src = ENEMY_HIT_SRC;

    let score = 0;
    let timeLeft = 30;
    let isPlaying = false;
    let countdownInterval = null;

    let player = { x: 0, y: 0, size: 40, speed: 6 }; // 略微调小自机判定，让操作更丝滑
    let bullets = [];
    let enemies = [];
    let keys = { up: false, down: false, left: false, right: false };

    // 键盘监听
    window.addEventListener('keydown', e => {
        if(!isPlaying) return;
        if(e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = true;
        if(e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = true;
        if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
        if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
        if(e.key === ' ' || e.key === 'j' || e.key === 'J') fireBullet();
    });
    window.addEventListener('keyup', e => {
        if(e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = false;
        if(e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = false;
        if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.false;
        if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
        if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
    });

    // 触控监听
    function setupMobileControl(btnId, direction) {
        const btn = document.getElementById(btnId);
        
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (direction === 'fire') {
                fireBullet();
            } else {
                keys[direction] = true;
            }
        }, { passive: false });

        btn.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (direction !== 'fire') {
                keys[direction] = false;
            }
        }, { passive: false });
    }

    setupMobileControl('btn-up', 'up');
    setupMobileControl('btn-down', 'down');
    setupMobileControl('btn-left', 'left');
    setupMobileControl('btn-right', 'right');
    setupMobileControl('btn-fire', 'fire');

    function fireBullet() {
        if(!isPlaying) return;
        bullets.push({ 
            x: player.x + player.size / 2 - 3, 
            y: player.y, 
            width: 6, 
            height: 18, 
            speed: 9 
        });
    }

    function spawnEnemy() {
        if(Math.random() < 0.04) {
            enemies.push({
                x: Math.random() * (canvas.width - 45),
                y: -50,
                size: 45,
                speed: 2.2 + Math.random() * 2.8,
                status: 'alive', 
                hitTimer: 0     
            });
        }
    }

    function gameLoop() {
        if(!isPlaying) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (keys.up && player.y > 0) player.y -= player.speed;
        if (keys.down && player.y < canvas.height - player.size) player.y += player.speed;
        if (keys.left && player.x > 0) player.x -= player.speed;
        if (keys.right && player.x < canvas.width - player.size) player.x += player.speed;

        // 自机渲染
        ctx.fillStyle = '#2ed573';
        ctx.beginPath();
        ctx.moveTo(player.x + player.size / 2, player.y);
        ctx.lineTo(player.x, player.y + player.size);
        ctx.lineTo(player.x + player.size, player.y + player.size);
        ctx.closePath();
        ctx.fill();

        // 子弹渲染与逻辑
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.y -= b.speed;
            ctx.fillStyle = '#fff200';
            ctx.fillRect(b.x, b.y, b.width, b.height);
            if(b.y < 0) bullets.splice(i, 1);
        }

        // 敌人渲染与核心碰撞检测
        spawnEnemy();
        for (let i = enemies.length - 1; i >= 0; i--) {
            let enemy = enemies[i];

            if (enemy.status === 'alive') {
                enemy.y += enemy.speed;
                ctx.drawImage(imgAlive, enemy.x, enemy.y, enemy.size, enemy.size);

                // 越界检查
                if (enemy.y > canvas.height) {
                    enemies.splice(i, 1);
                    continue;
                }

                // ⚡ 新增：自机与炮弹的碰撞检测（AABB检测机制）
                if (player.x < enemy.x + enemy.size &&
                    player.x + player.size > enemy.x &&
                    player.y < enemy.y + enemy.size &&
                    player.y + player.size > enemy.y) {
                    
                    endGame('hit'); // 传入坠毁原因，终止游戏
                    return; 
                }

                // 子弹与敌人碰撞
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let bullet = bullets[j];
                    if (bullet.x < enemy.x + enemy.size &&
                        bullet.x + bullet.width > enemy.x &&
                        bullet.y < enemy.y + enemy.size &&
                        bullet.y + bullet.height > enemy.y) {
                        
                        enemy.status = 'hit';
                        score += 10;
                        document.getElementById('score-val').innerText = score;
                        bullets.splice(j, 1);
                        break; 
                    }
                }
            } else if (enemy.status === 'hit') {
                ctx.drawImage(imgHit, enemy.x, enemy.y, enemy.size, enemy.size);
                enemy.hitTimer++;
                if (enemy.hitTimer > 5) {
                    enemies.splice(i, 1);
                }
            }
        }

        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        resizeCanvas();
        
        score = 0;
        timeLeft = 30;
        bullets = [];
        enemies = [];
        player.x = canvas.width / 2 - player.size / 2;
        player.y = canvas.height * 0.75;
        
        document.getElementById('score-val').innerText = score;
        document.getElementById('time-val').innerText = timeLeft;
        
        isPlaying = true;
        gameLoop();

        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('time-val').innerText = timeLeft;
            if(timeLeft <= 0) {
                endGame('timeout'); // 传入时间到原因
            }
        }, 1000);
    }

    // 优化后的结束逻辑，动态判定失败原因
    function endGame(reason) {
        isPlaying = false;
        clearInterval(countdownInterval);
        
        if (reason === 'hit') {
            document.getElementById('overlay-title').innerText = "战机坠毁，游戏结束！";
            document.getElementById('overlay-desc').innerText = `很遗憾，您正面撞上了炮弹！💥<br>最终斩获积分：${score} 分`;
        } else {
            document.getElementById('overlay-title').innerText = "时间到，完美生还！";
            document.getElementById('overlay-desc').innerText = `恭喜你在猛烈攻势下撑过了 30 秒！🏆<br>最终统计算分：${score} 分`;
        }
        
        document.getElementById('start-btn').innerText = "再次挑战";
        document.getElementById('overlay').style.display = 'flex';
    }
</script>
</body>
</html>

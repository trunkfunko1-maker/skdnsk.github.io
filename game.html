<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>王茂钢打飞机大作战</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* 禁用系统默认缩放和双击 */
        }
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh; /* 适配移动端动态视口 */
            overflow: hidden;
        }

        /* 游戏主容器 */
        #wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            height: 100dvh; /* 撑满动态屏幕，防止被移动端工具栏挤压 */
            background: #000;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* 🖥️ 电脑端网页动态样式扩展 */
        #wrapper.pc-mode {
            max-width: 800px;
            max-height: 600px;
            height: 600px;
            border: 4px solid #3d346d;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(91, 77, 163, 0.2);
        }

        /* 顶栏 */
        #status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #1e1e1e;
            border-bottom: 2px solid #2d2d2d;
            z-index: 5;
            flex-shrink: 0; /* 绝对不允许被挤压 */
        }
        #wrapper.pc-mode #status-bar {
            padding: 15px 25px;
            background: #18142c;
            border-bottom: 3px solid #282147;
        }

        .sb-left {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .sb-link {
            color: #ffffff;
            text-decoration: none;
            transition: color 0.2s ease;
            cursor: pointer;
        }
        .sb-link:hover {
            color: #2ed573;
        }

        .sb-right {
            display: flex;
            gap: 12px;
            color: #ccc;
            font-size: 15px;
            font-weight: bold;
        }
        .data-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 4px 10px;
            border-radius: 6px;
        }
        .data-highlight {
            color: #fff200;
        }

        /* 画布区域 */
        #canvas-container {
            position: relative;
            flex-grow: 1;
            width: 100%;
            background: #050505;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 🎯 特殊炮弹击中顶部弹窗提示 */
        #special-popup {
            display: none;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 10, 30, 0.95);
            border: 2px solid #fff200;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            z-index: 12;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 242, 0, 0.6);
            white-space: nowrap;
            pointer-events: none;
            animation: popupFadeIn 0.2s ease-out;
        }
        .popup-highlight {
            color: #fff200;
            font-size: 16px;
            margin-left: 4px;
            text-shadow: 0 0 8px rgba(255, 242, 0, 0.6);
        }
        @keyframes popupFadeIn {
            from { transform: translateX(-50%) scale(0.85); opacity: 0; }
            to { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        /* 遮罩层 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            align-items: center;
            color: white;
            z-index: 10;
            text-align: center; 
            padding: 40px 20px 20px 20px; 
        }
        
        .overlay-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .overlay h2 { 
            margin-bottom: 15px; 
            font-size: 28px; 
            color: #ff4757; 
            line-height: 1.4; 
        }
        .overlay p { margin-bottom: 20px; font-size: 14px; color: #ccc; line-height: 1.6; }

        /* 选项按钮行 */
        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .mode-btn {
            padding: 8px 18px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .mode-btn.active {
            background: #ff4757;
            color: #fff;
            border-color: #ff4757;
            box-shadow: 0 0 12px rgba(255, 71, 87, 0.5);
        }

        /* 主按钮 */
        .main-btn {
            padding: 12px 45px;
            font-size: 18px;
            background: linear-gradient(180deg, #2ed573 0%, #26af5f 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.4);
        }

        /* 📱 手机端专用悬浮操作盘 */
        #mobile-controller {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none; 
            z-index: 8;
            transition: opacity 0.3s ease;
        }
        #wrapper.pc-mode #mobile-controller {
            display: none !important;
        }

        /* 📱 仅保留左右方向键的扁平化操作盘 */
        .dpad-horizontal {
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        .ctrl-btn {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            width: 65px;
            height: 65px;
            touch-action: none;
        }
        .ctrl-btn:active {
            background: rgba(255, 255, 255, 0.4);
            color: #fff;
        }

        /* 开火键区 */
        .fire-sector {
            pointer-events: auto;
        }
        #btn-fire {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 71, 87, 0.6);
            color: white;
            font-size: 30px;
            border: 2px solid rgba(255, 71, 87, 0.8);
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }
        #btn-fire:active {
            background: rgba(255, 71, 87, 0.9);
            transform: scale(0.95);
        }

        /* 页面面板底部的灰色版权信息标注 */
        .overlay-footer {
            font-size: 13px;
            color: #555266;
            letter-spacing: 0.5px;
            margin-top: 20px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <!-- 游戏主容器 -->
    <div id="wrapper">
        <div id="status-bar">
            <div class="sb-left">
                <a href="index.html" class="sb-link">川大附中天堂网</a>
            </div>
            <div class="sb-right">
                <div class="data-item">得分: <span id="score-val" class="data-highlight">0</span></div>
                <div class="data-item">时间: <span id="time-val" class="data-highlight">30</span>s</div>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
            
            <!-- 🎯 特殊击中横幅弹窗 -->
            <div id="special-popup">恭喜你已拿下怪物鸡巴！<span class="popup-highlight">分数+78</span></div>
            
            <!-- 遮罩层主界面 -->
            <div id="overlay" class="overlay">
                <div class="overlay-content">
                    <h2 id="overlay-title">王茂钢打飞机<br>大作战</h2>
                    <p id="overlay-desc">请先选择对应的网页游玩终端：</p>
                    
                    <div class="mode-selector" id="selector-box">
                        <button class="mode-btn active" id="mode-mobile" onclick="switchMode('mobile')">📱 手机端网页</button>
                        <button class="mode-btn" id="mode-pc" onclick="switchMode('pc')">🖥️ 电脑端网页</button>
                    </div>

                    <button id="start-btn" class="main-btn" onclick="startGame()">开始游戏</button>
                </div>

                <!-- 确保手机端绝对可见的底部灰色版权 -->
                <div class="overlay-footer">© 2026 川大附中天堂网出品</div>
            </div>
        </div>

        <!-- 📱 手机端控制区 -->
        <div id="mobile-controller">
            <div class="dpad-horizontal">
                <button class="ctrl-btn" id="btn-left">◀</button>
                <button class="ctrl-btn" id="btn-right">▶</button>
            </div>

            <div class="fire-sector">
                <button class="ctrl-btn" id="btn-fire">🔥</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');
    const wrapper = document.getElementById('wrapper');

    let currentDeviceMode = 'mobile'; 

    function resizeCanvas() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function switchMode(mode) {
        if(isPlaying) return;
        currentDeviceMode = mode;
        
        const btnMobile = document.getElementById('mode-mobile');
        const btnPC = document.getElementById('mode-pc');
        const descText = document.getElementById('overlay-desc');

        if(mode === 'pc') {
            wrapper.classList.add('pc-mode');
            btnPC.classList.add('active');
            btnMobile.classList.remove('active');
            descText.innerHTML = "【电脑端控制指南】<br>移动：键盘 A、D 键 或 ◀ ▶ 方向键<br>开火：空格键 或 J 键";
            player.size = 46; 
            player.speed = 7;
        } else {
            wrapper.classList.remove('pc-mode');
            btnMobile.classList.add('active');
            btnPC.classList.remove('active');
            descText.innerHTML = "使用屏幕底部左右方向键控制机体<br>右下角红按钮开火！";
            player.size = 40;
            player.speed = 6;
        }
        keys.left = false; keys.right = false; keys.up = false; keys.down = false;
        setTimeout(resizeCanvas, 50); 
    }

    // --- 图片资源 ---
    const ENEMY_ALIVE_SRC = 'https://i.ibb.co/PG22J8FX/Screenshot-20260517-004026-edit-580395464196329.png'; 
    const ENEMY_HIT_SRC = 'https://i.ibb.co/F4jXTCjw/retouch-2026051701391671.png';   
    const ENEMY_SPECIAL_SRC = 'https://i.ibb.co/6JL1y2FC/Screenshot-20260517-151827.png'; // 🎯 特殊怪物存活贴图
    const ENEMY_SPECIAL_HIT_SRC = 'https://i.ibb.co/4b1bxb3/Screenshot-20260517-152843.png'; // 🎯 新增：特殊怪物专属击中贴图

    const imgAlive = new Image(); imgAlive.src = ENEMY_ALIVE_SRC;
    const imgHit = new Image(); imgHit.src = ENEMY_HIT_SRC;
    const imgSpecial = new Image(); imgSpecial.src = ENEMY_SPECIAL_SRC;
    const imgSpecialHit = new Image(); imgSpecialHit.src = ENEMY_SPECIAL_HIT_SRC;

    let score = 0;
    let timeLeft = 30;
    let isPlaying = false;
    let countdownInterval = null;
    let popupTimer = null;

    let player = { x: 0, y: 0, size: 40, speed: 6 }; 
    let bullets = [];
    let enemies = [];
    let keys = { up: false, down: false, left: false, right: false };
    
    // 跟踪特殊Boss生成的时间队列
    let specialSpawnSeconds = [];

    // 绘制小战斗机
    function drawFighter(x, y, size) {
        ctx.save();
        ctx.translate(x + size / 2, y + size / 2);

        // 1. 动态发动机尾焰
        if (Math.random() > 0.3) {
            ctx.fillStyle = Math.random() > 0.5 ? '#ff4757' : '#ffa502';
            ctx.beginPath();
            ctx.moveTo(-4, size / 2 - 2);
            ctx.lineTo(0, size / 2 + 10 + Math.random() * 5);
            ctx.lineTo(4, size / 2 - 2);
            ctx.closePath();
            ctx.fill();
        }

        // 2. 主翼
        ctx.fillStyle = '#26af5f'; 
        ctx.beginPath();
        ctx.moveTo(0, -size / 4);
        ctx.lineTo(-size / 2, size / 4);
        ctx.lineTo(size / 2, size / 4);
        ctx.closePath();
        ctx.fill();

        // 3. 主机身
        ctx.fillStyle = '#2ed573'; 
        ctx.beginPath();
        ctx.moveTo(0, -size / 2);         
        ctx.lineTo(-size / 6, -size / 6);  
        ctx.lineTo(-size / 8, size / 2);   
        ctx.lineTo(size / 8, size / 2);    
        ctx.lineTo(size / 6, -size / 6);   
        ctx.closePath();
        ctx.fill();

        // 4. 前翼板
        ctx.fillStyle = '#26af5f';
        ctx.fillRect(-size / 4, 0, size / 2, size / 12);

        // 5. 科技舱盖
        ctx.fillStyle = '#00ffff'; 
        ctx.beginPath();
        ctx.moveTo(0, -size / 3);
        ctx.lineTo(-size / 12, -size / 8);
        ctx.lineTo(size / 12, -size / 8);
        ctx.closePath();
        ctx.fill();

        // 6. 尾翼线
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, size / 4);
        ctx.lineTo(0, size / 2);
        ctx.stroke();

        ctx.restore();
    }

    // 键盘监听
    window.addEventListener('keydown', e => {
        if(!isPlaying) return;
        if(e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = true;
        if(e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = true;
        if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
        if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
        if(e.key === ' ' || e.key === 'j' || e.key === 'J') fireBullet();
    });
    window.addEventListener('keyup', e => {
        if(e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = false;
        if(e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = false;
        if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
        if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
    });

    // 指针安全控制管理
    let activePointers = {}; 

    function setupSafeControl(btnId, direction) {
        const btn = document.getElementById(btnId);
        
        btn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if(!isPlaying) return;
            
            if (direction === 'fire') {
                fireBullet();
            } else {
                activePointers[e.pointerId] = direction;
                keys[direction] = true;
                btn.setPointerCapture(e.pointerId); 
            }
        });
    }

    window.addEventListener('pointerup', (e) => {
        const boundDirection = activePointers[e.pointerId];
        if (boundDirection) {
            keys[boundDirection] = false;
            delete activePointers[e.pointerId];
        }
    });
    window.addEventListener('pointercancel', (e) => {
        const boundDirection = activePointers[e.pointerId];
        if (boundDirection) {
            keys[boundDirection] = false;
            delete activePointers[e.pointerId];
        }
    });

    setupSafeControl('btn-left', 'left');
    setupSafeControl('btn-right', 'right');
    setupSafeControl('btn-fire', 'fire');

    function fireBullet() {
        if(!isPlaying) return;
        bullets.push({ 
            x: player.x + player.size / 2 - 3, 
            y: player.y, 
            width: 6, 
            height: currentDeviceMode === 'pc' ? 20 : 18, 
            speed: currentDeviceMode === 'pc' ? 11 : 9 
        });
    }

    // 生成常规敌人
    function spawnEnemy() {
        let spawnRate = currentDeviceMode === 'pc' ? 0.05 : 0.04;
        if(Math.random() < spawnRate) {
            const enemySize = currentDeviceMode === 'pc' ? 65 : 60; 
            enemies.push({
                x: Math.random() * (canvas.width - enemySize),
                y: -enemySize,
                size: enemySize,
                speed: 3.0 + Math.random() * 3.5,
                status: 'alive', 
                hitTimer: 0,
                isSpecial: false     
            });
        }
    }

    // 🎯 核心调整：再次放大特殊炮弹并提升速度
    function triggerSpecialSpawn() {
        const baseSize = currentDeviceMode === 'pc' ? 65 : 60;
        const specialSize = baseSize * 1.7; // 调整：体积放大至 1.7 倍
        
        enemies.push({
            x: Math.random() * (canvas.width - specialSize),
            y: -specialSize,
            size: specialSize,
            speed: 8.5 + Math.random() * 2.5, // 调整：再次提速 (8.5 - 11.0)
            status: 'alive',
            hitTimer: 0,
            isSpecial: true
        });
    }

    // 🎯 控制顶部78分提示弹窗展示
    function triggerSpecialPopup() {
        const popup = document.getElementById('special-popup');
        popup.style.display = 'block';
        
        if(popupTimer) clearTimeout(popupTimer);
        popupTimer = setTimeout(() => {
            popup.style.display = 'none';
        }, 1500); 
    }

    function gameLoop() {
        if(!isPlaying) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (keys.up && player.y > 0) player.y -= player.speed;
        if (keys.down && player.y < canvas.height - player.size) player.y += player.speed;
        if (keys.left && player.x > 0) player.x -= player.speed;
        if (keys.right && player.x < canvas.width - player.size) player.x += player.speed;

        drawFighter(player.x, player.y, player.size);

        // 子弹
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.y -= b.speed;
            ctx.fillStyle = '#fff200';
            ctx.fillRect(b.x, b.y, b.width, b.height);
            if(b.y < 0) bullets.splice(i, 1);
        }

        // 敌人/炮弹综合渲染控制
        spawnEnemy();
        for (let i = enemies.length - 1; i >= 0; i--) {
            let enemy = enemies[i];

            if (enemy.status === 'alive') {
                enemy.y += enemy.speed;
                
                // 根据类别绘制普通图片或专属特殊贴图
                if(enemy.isSpecial) {
                    ctx.drawImage(imgSpecial, enemy.x, enemy.y, enemy.size, enemy.size);
                } else {
                    ctx.drawImage(imgAlive, enemy.x, enemy.y, enemy.size, enemy.size);
                }

                if (enemy.y > canvas.height) {
                    enemies.splice(i, 1);
                    continue;
                }

                // 碰撞自机判定
                if (player.x < enemy.x + enemy.size &&
                    player.x + player.size > enemy.x &&
                    player.y < enemy.y + enemy.size &&
                    player.y + player.size > enemy.y) {
                    endGame('hit'); 
                    return; 
                }

                // 子弹击中判定
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let bullet = bullets[j];
                    if (bullet.x < enemy.x + enemy.size &&
                        bullet.x + bullet.width > enemy.x &&
                        bullet.y < enemy.y + enemy.size &&
                        bullet.y + bullet.height > enemy.y) {
                        
                        enemy.status = 'hit';
                        
                        // 判定加分：普通+10，特殊Boss击中+78分并爆出中上横幅
                        if(enemy.isSpecial) {
                            score += 78;
                            triggerSpecialPopup();
                        } else {
                            score += 10;
                        }
                        
                        document.getElementById('score-val').innerText = score;
                        bullets.splice(j, 1);
                        break; 
                    }
                }
            } else if (enemy.status === 'hit') {
                // 🎯 核心调整：根据是否是特殊炮弹，渲染不同的爆炸受击效果图
                if(enemy.isSpecial) {
                    ctx.drawImage(imgSpecialHit, enemy.x, enemy.y, enemy.size, enemy.size);
                } else {
                    ctx.drawImage(imgHit, enemy.x, enemy.y, enemy.size, enemy.size);
                }
                
                enemy.hitTimer++;
                if (enemy.hitTimer > 5) { enemies.splice(i, 1); }
            }
        }

        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('special-popup').style.display = 'none';
        resizeCanvas();
        
        score = 0;
        timeLeft = 30;
        bullets = [];
        enemies = [];
        player.x = canvas.width / 2 - player.size / 2;
        player.y = canvas.height * 0.82; 
        
        document.getElementById('score-val').innerText = score;
        document.getElementById('time-val').innerText = timeLeft;

        // 算法：每次开局保底决定出1到2个特殊怪物，并随机构建发生秒数时间表
        specialSpawnSeconds = [];
        const spawnCount = Math.floor(Math.random() * 2) + 1; // 纯正随机 1 或 2 
        while(specialSpawnSeconds.length < spawnCount) {
            let targetSecond = Math.floor(Math.random() * 20) + 5; // 限定在游戏 5~25 秒之间发生
            if(!specialSpawnSeconds.includes(targetSecond)) {
                specialSpawnSeconds.push(targetSecond);
            }
        }
        
        isPlaying = true;
        gameLoop();

        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('time-val').innerText = timeLeft;
            
            if(specialSpawnSeconds.includes(timeLeft)) {
                triggerSpecialSpawn();
            }

            if(timeLeft <= 0) { endGame('timeout'); }
        }, 1000);
    }

    function endGame(reason) {
        isPlaying = false;
        clearInterval(countdownInterval);
        if(popupTimer) clearTimeout(popupTimer);
        document.getElementById('special-popup').style.display = 'none';
        
        keys.left = false; keys.right = false; keys.up = false; keys.down = false;
        activePointers = {};

        const descElement = document.getElementById('overlay-desc');
        document.getElementById('selector-box').style.display = 'flex'; 
        
        if (reason === 'hit') {
            document.getElementById('overlay-title').innerHTML = "战机坠毁<br>游戏结束！";
            descElement.innerHTML = `很遗憾，你被小飞机击中了！💤<br><br>最终斩获积分：<span style="color:#fff200; font-weight:bold;">${score}</span> 分`;
        } else {
            document.getElementById('overlay-title').innerHTML = "时间到<br>完美生还！";
            descElement.innerHTML = `恭喜你在猛烈攻势下撑过了 30 秒！🏆<br><br>最终统计算分：<span style="color:#fff200; font-weight:bold;">${score}</span> 分`;
        }
        
        document.getElementById('start-btn').innerText = "再次挑战";
        document.getElementById('overlay').style.display = 'flex';
    }

    switchMode('mobile');
</script>
</body>
                    </html>

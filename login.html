<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份验证 - 川大附中天堂网</title>
    <style>
        body {
            background: #0f0c20;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #15102a;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #3d346d;
            width: 90%;
            max-width: 360px;
        }
        h2 { margin-bottom: 20px; color: #ff4757; }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #3d346d;
            background: #0f0c20;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #2ed573;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #26af5f; }
        #error-msg { color: #ff3838; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>请输入访问凭证</h2>
        <input type="text" id="username" placeholder="请输入账号">
        <input type="password" id="password" placeholder="请输入密码">
        <button onclick="checkLogin()">确认登录</button>
        <p id="error-msg"></p>
    </div>

<script>
    function checkLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const error = document.getElementById('error-msg');

        // 🔒 在此处设置您的账号和密码
        if (u === "admin" && p === "123456") {
            // 登录成功，发放通行证。
            // 使用 sessionStorage：关闭浏览器标签页后需要重新输入
            // 如果想让用户电脑永久记住，可以换成 localStorage.setItem
            sessionStorage.setItem('site_auth_token', 'passed_successfully');
            
            // 检查之前是从哪个页面被拦截过来的
            const redirectUrl = sessionStorage.getItem('auth_redirect_url') || 'index.html';
            sessionStorage.removeItem('auth_redirect_url'); // 擦除缓存
            
            window.location.href = redirectUrl; // 跳转回原页面
        } else {
            error.innerText = "账号或密码错误，拒绝访问！";
        }
    }

    // 支持回车键登录
    window.addEventListener('keydown', e => {
        if(e.key === 'Enter') checkLogin();
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份验证</title>
    <!-- 引入全局安全脚本 -->
    <script src="auth.js"></script>
    <style>
        body { background: #0f0c20; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #15102a; padding: 30px; border-radius: 12px; border: 1px solid #3d346d; text-align: center; width: 90%; max-width: 360px; }
        h2 { margin-bottom: 20px; color: #ff4757; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #3d346d; background: #0f0c20; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2ed573; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #error-msg { color: #ff3838; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>请输入访问凭证</h2>
        <input type="text" id="username" placeholder="请输入账号">
        <input type="password" id="password" placeholder="请输入密码">
        <button onclick="submitForm()">确认登录</button>
        <p id="error-msg"></p>
    </div>
<script>
    function submitForm() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        // 调用 auth.js 里的全局验证方法
        const success = window.executeSiteLogin(u, p);
        if (!success) {
            document.getElementById('error-msg').innerText = "账号或密码错误！";
        }
    }
    window.addEventListener('keydown', e => { if(e.key === 'Enter') submitForm(); });
</script>
</body>
</html>
